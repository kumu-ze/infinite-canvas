server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # NAS-local, same-origin WebDAV bridge. The browser sends fnOS Basic Auth
    # credentials; this avoids fnOS CORS limitations without exposing WebDAV via relay-01.
    location /webdav/ {
        # fnOS exposes user shares as a virtual top-level directory. Bind this
        # local-only bridge directly to the authorized `固态` share.
        proxy_pass https://host.docker.internal:5006/%E5%9B%BA%E6%80%81/;
        proxy_http_version 1.1;
        proxy_ssl_verify off;
        proxy_ssl_server_name off;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Depth $http_depth;
        proxy_set_header Destination $http_destination;
        proxy_set_header Overwrite $http_overwrite;
        proxy_pass_request_body on;
        client_max_body_size 2g;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
